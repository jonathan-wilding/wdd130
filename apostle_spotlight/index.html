<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostle Spotlight Challenge</title>
    <style>
        body {
            background-color: #EBECEB;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .spotlight-card {
            background: url('images/christus.png') no-repeat center center;
            background-size: cover;
            width: 800px;
            height: 550px;
            border-radius: 24px;
            border: 5px solid #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            display: grid;
            grid-template-columns: 240px 1fr;
            box-sizing: border-box;
        }
        .right-content {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            padding: 20px 30px 20px 10px;
            color: #ffffff;
        }
        h2, h3 {
            text-align: center;
            font-weight: normal;
            margin: 0 0 10px 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        h2 { font-size: 24px; }
        h3 { font-size: 18px; }
        .presidency-row {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .quorum-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px 10px;
            justify-items: center;
        }
        .portrait-frame {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }
        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .portrait-frame:hover {
            border-color: #f59e0b;
            transform: scale(1.12);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.8);
        }
    </style>
</head>
<body>

    <div class="spotlight-card">
        <div></div>

        <div class="right-content">
            
            <section>
                <h2>First Presidency</h2>
                <div class="presidency-row">
                    <div class="portrait-frame"><img src="images/eyring.png" alt="President Eyring"></div>
                    <div class="portrait-frame"><img src="images/oaks.png" alt="President Oaks"></div>
                    <div class="portrait-frame"><img src="images/uchtdorf.png" alt="President Uchtdorf"></div>
                </div>
            </section>
            <section>
                <h3>Quorum of the Twelve Apostles</h3>
                <div class="quorum-grid">
                    <div class="portrait-frame"><img src="images/bednar.png" alt="Elder Bednar"></div>
                    <div class="portrait-frame"><img src="images/cook.png" alt="Elder Cook"></div>
                    <div class="portrait-frame"><img src="images/christofferson.png" alt="Elder Christofferson"></div>
                    <div class="portrait-frame"><img src="images/andersen.png" alt="Elder Andersen"></div>
                    
                    <div class="portrait-frame"><img src="images/rasband.png" alt="Elder Rasband"></div>
                    <div class="portrait-frame"><img src="images/stevenson.png" alt="Elder Stevenson"></div>
                    <div class="portrait-frame"><img src="images/renlund.png" alt="Elder Renlund"></div>
                    <div class="portrait-frame"><img src="images/gong.png" alt="Elder Gong"></div>
                    
                    <div class="portrait-frame"><img src="images/soares.png" alt="Elder Soares"></div>
                    <div class="portrait-frame"><img src="images/kearon.png" alt="Elder Kearon"></div>
                    <div class="portrait-frame"><img src="images/causse.png" alt="Bishop Caussé"></div>
                    <div class="portrait-frame"><img src="images/gilbert.png" alt="Elder Gilbert"></div>
                </div>
            </section>

        </div>
    </div>

</body>
</html>
