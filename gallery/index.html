<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images of Christ</title>
    <style>
        body {
            background: black;
        }
        #wrapper{
            width: 600px;
            margin: 0 auto;
        }
        nav {
            color: white;
            text-align: center;
            font-family: Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        #gallery{
            display: grid;
            grid-template-columns: 200px 200px 200px;
            border: 15px solid rgb(255, 255, 255);
            width: 100%;
            background-color: #ddd;
            background-image:
                linear-gradient(45deg, #ccc 26%, transparent 26%), 
                linear-gradient(135deg, #ccc 26%, transparent 26%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(135deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 0, 10px -10px, 0px 10px; 
            
        }
        #gallery a {
            cursor: url('images/christus.png'), pointer;
            overflow: hidden;
        }
        #gallery img {
            width: 200px; 
            height: 300px;
            opacity:50%;
            display:block;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #gallery img:hover{
            opacity: 100%;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <nav>
            <h1>Christ Art Gallery</h1>
        </nav>
        <main>
            <div id="gallery">
                <a href="images/big/img1.jpg"><img src="images/small/img1.webp" alt="Christ praying with the Nephites"></a>
                <a href="images/big/img2.jpg"><img src="images/small/img2.webp" alt="Jesus the Christ"></a>
                <a href="images/big/img3.jpg"><img src="images/small/img3.webp" alt="Jesus Raising the Daughter of Jairus"></a>
                <a href="images/big/img4.jpg"><img src="images/small/img4.webp" alt="The Lord Appears in the Kirtland Temple"></a>
                <a href="images/big/img5.jpg"><img src="images/small/img5.webp" alt="Crucifixion of Jesus Christ"></a>
                <a href="images/big/img6.jpg"><img src="images/small/img6.webp" alt="Jesus Calms the Storm"></a>
            </div>
        </main>
    </div>
</body>
</html>
